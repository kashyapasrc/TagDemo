name: "Deploy STG and Pre-prod"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Select environment
        options:
          - uat
          - pre_prod
jobs:
  deploy:
    name: "Deploy to STG and Pre-prod"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

     
      - name: Download yq locally
        run: |
          wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O yq
          chmod +x yq
      - name: YQ - pick version from props.yaml
        run: |
          ENV="${{ github.event.inputs.environment }}"
          VERSION=$(yq e ".configurations[\"$ENV\"].version_name" props.yaml)
          CHANGELOG_FILE=$(./yq e ".configurations[\"$ENV\"].release_notes" props.yaml)
          RELEASE_NOTES=$(awk "/## $VERSION/{flag=1;next}/## /{flag=0}flag" "$CHANGELOG_FILE")
          echo "$RELEASE_NOTES"
          echo $VERSION
        shell: bash
